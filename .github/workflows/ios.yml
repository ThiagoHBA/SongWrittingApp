name: iOS starter workflow

on:
  push:
    branches: [ "main", "developer" ]
  pull_request:
    branches: [ "main", "developer" ]

jobs:
  build:
    name: Build and Test default scheme using any available iPhone simulator
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Fastlane
        run: bundle install

      - name: Run Tests & Coverage
        run: bundle exec fastlane coverage

      - name: Upload Coverage HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_output/

      - name: Publish Coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const json = JSON.parse(fs.readFileSync('coverage_output/report.json', 'utf8'));
            const pct = json.coverage_percentage.toFixed(2);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Code Coverage: ${pct}%`
            })
      - name: Update Coverage Badge Gist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: 591fb2a8ad5a53abefc115f035d03162
          file_path: coverage_output/coverage_badge.json
          file_type: text