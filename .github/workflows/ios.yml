name: iOS starter workflow

on:
  push:
    branches: [ "main", "developer" ]
  pull_request:
    branches: [ "main", "developer" ]

jobs:
  build:
    name: Build and Test default scheme using any available iPhone simulator
    runs-on: macos-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Fastlane
        run: bundle install

      - name: Run Package Tests
        run: bundle exec fastlane package_tests

      - name: Run Tests & Coverage
        run: bundle exec fastlane coverage

      - name: Generate Coverage Badge JSON
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const outputDir = 'coverage_output';
          const normalizedReportPath = path.join(outputDir, 'report.json');
          const badgePath = 'coverage_output/coverage_badge.json';

          function collectJsonFiles(dir) {
            if (!fs.existsSync(dir)) {
              return [];
            }

            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const entryPath = path.join(dir, entry.name);
              return entry.isDirectory() ? collectJsonFiles(entryPath) : [entryPath];
            }).filter((entryPath) => path.basename(entryPath).startsWith('report.json'));
          }

          const reports = collectJsonFiles(outputDir)
            .sort((a, b) => fs.statSync(b).mtimeMs - fs.statSync(a).mtimeMs);

          const reportPath = fs.existsSync(normalizedReportPath)
            ? normalizedReportPath
            : reports[0];

          if (!reportPath) {
            throw new Error(`No coverage report found under ${outputDir}`);
          }

          const raw = fs.readFileSync(reportPath, 'utf8');
          const json = JSON.parse(raw);

          const value = (
            json.coverage_percentage ??
            json.covered_percent ??
            json.targets?.[0]?.coverage ??
            json.coverage ??
            json.lineCoverage ??
            0
          );

          const numeric = Number.parseFloat(value);
          const percentage = numeric <= 1 ? numeric * 100 : numeric;
          const color = percentage > 80 ? 'brightgreen' : percentage > 60 ? 'yellow' : 'red';

          fs.mkdirSync(path.dirname(badgePath), { recursive: true });
          fs.writeFileSync(normalizedReportPath, JSON.stringify(json, null, 2));
          fs.writeFileSync(
            badgePath,
            JSON.stringify({
              schemaVersion: 1,
              label: 'coverage',
              message: `${percentage.toFixed(1)}%`,
              color,
            })
          );
          NODE

      - name: Upload Coverage HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_output/

      - name: Debug Coverage JSON
        run: cat coverage_output/report.json

      - name: Publish Coverage on PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('coverage_output/report.json', 'utf8');
            const json = JSON.parse(raw);

            const pct = (
              json.coverage_percentage ??
              json.covered_percent ??
              json.targets?.[0]?.coverage ??
              json.coverage ??
              json.lineCoverage ??
              0
            );

            const formatted = (parseFloat(pct) * (pct <= 1 ? 100 : 1)).toFixed(2);

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Code Coverage: ${formatted}%`
            })
      - name: Update Coverage Badge Gist
        if: ${{ github.event_name == 'push' && contains(fromJSON('["main", "developer"]'), github.ref_name) }}
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: 591fb2a8ad5a53abefc115f035d03162
          file_path: coverage_output/coverage_badge.json
          file_type: text
